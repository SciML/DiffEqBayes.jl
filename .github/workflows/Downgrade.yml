name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    # Runs strict (the @v1 reusable workflow hardcodes allow_reresolve=false); expected RED until Turing/DynamicPPL is fixed. See https://github.com/SciML/DiffEqBayes.jl/issues/370
    name: "Downgrade"
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "lts"
      group: "Core"
    secrets: "inherit"
